<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="conta.css">
    <title>Calculadora de Juros Compostos</title>
    <style>
        body {
            color: #ffff; /* All text will be white */
        }
    </style>
</head>
<body>

<h2>Calculadora de Juros Compostos</h2>

<label>
    <input type="radio" name="mode" value="normal" checked>
    Calcular Valor Final
</label>

<label>
    <input type="radio" name="mode" value="reverse">
    Calcular Investimento Necessário
</label>

<br><br>

<label id="principalLabel">Valor Inicial:</label>
<input type="number" id="principal" step="0.01"><br><br>

<label>Taxa (% por período):</label>
<input type="number" id="rate" step="0.01"><br><br>

<label>Tempo (período):</label>
<input type="number" id="time" step="1"><br><br>

<button onclick="calculate()">Calcular</button>

<h3 id="result"></h3>

<script>
// Toggle label text
const radios = document.querySelectorAll(`input[name="mode"]`);

radios.forEach(radio => {
    radio.addEventListener("change", () => {
        const label = document.getElementById("principalLabel");

        if (radio.value === "normal" && radio.checked) {
            label.textContent = "Valor Inicial:";
        }

        if (radio.value === "reverse" && radio.checked) {
            label.textContent = "Valor Final Desejado:";
        }

        document.getElementById("result").innerHTML = "";
    });
});

function calculate() {
    const mode = document.querySelector(`input[name="mode"]:checked`).value;
    const principalInput = parseFloat(document.getElementById("principal").value);
    const ratePercent = parseFloat(document.getElementById("rate").value);
    const time = parseFloat(document.getElementById("time").value);

    if (isNaN(principalInput) || isNaN(ratePercent) || isNaN(time)) {
        document.getElementById("result").innerText =
            "Por favor, preencha todos os campos corretamente.";
        return;
    }

    const rate = ratePercent / 100;
    const base = 1 + rate;

    let output = "";

    if (mode === "normal") {
        const amount = principalInput * Math.pow(base, time);

        output = `
        Fórmula:<br>
        M = P × (1 + i)^n<br><br>

        Substituindo:<br>
        M = ${principalInput} × (${base.toFixed(4)})^${time}<br><br>

        Resultado:<br>
        M = ${amount.toFixed(2)}
        `;
    } else {
        const required = principalInput / Math.pow(base, time);

        output = `
        Fórmula Inversa:<br>
        P = M / (1 + i)^n<br><br>

        Substituindo:<br>
        P = ${principalInput} / (${base.toFixed(4)})^${time}<br><br>

        Investimento Necessário:<br>
        P = ${required.toFixed(2)}
        `;
    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
