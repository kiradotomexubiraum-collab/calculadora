<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="conta.css">
    <title>Calculadora de Juros</title>
    <style>
        body {
            color: #ffff; /* All text will be white */
        }
    </style>
</head>
<body>

<h2>Calculadora de Juros</h2>

<label>
    <input type="radio" name="mode" value="normal" checked>
    Calcular Juros Compostos
</label><br><br>

<label>
    <input type="radio" name="mode" value="reverse">
    Calcular Juros Compostos Inverso
</label><br><br>

<label>
    <input type="radio" name="mode" value="simple">
    Calcular Juros Simples
</label><br><br>

<label>
    <input type="radio" name="mode" value="simple-reverse">
    Calcular Juros Simples Inverso
</label>

<br><br>

<label id="principalLabel1"></label><br><br>

<label id="principalLabel">Valor Inicial:</label>
<input type="number" id="principal" step="0.01"><br><br>

<label>Taxa (% por período):</label>
<input type="number" id="rate" step="0.01"><br><br>

<label>Tempo (período):</label>
<input type="number" id="time" step="1"><br><br>

<div class="btn"></div><button class= "butao" onclick="calculate()">Calcular</button>

<h3 id="result"></h3>

<script>
// Toggle label text
const radios = document.querySelectorAll(`input[name="mode"]`);

radios.forEach(radio => {
    radio.addEventListener("change", () => {
        const label = document.getElementById("principalLabel");
        const label1 = document.getElementById("principalLabel1");

        if (radio.value === "normal" && radio.checked) {
            label.textContent = "Valor Inicial:";
            label1.textContent = "Calcular o valor final após os juros compostos."
        }

        if (radio.value === "reverse" && radio.checked) {
            label.textContent = "Valor Final Desejado:";
            label1.textContent = "Calcular o valor inicial necessário para atingir o valor final desejado com juros compostos."
        }

        if (radio.value === "simple" && radio.checked) {
            label.textContent = "Valor Inicial:";
            label1.textContent = "Calcular o valor final após os juros simples."
        }
        if(radio.value === "simple-reverse" && radio.checked){
            label.textContent = "Valor Final Desejado:";
            label1.textContent = "Calcular o valor inicial necessário para atingir o valor final desejado com juros simples."
        }

        document.getElementById("result").innerHTML = "";
    });
});

function calculate() {
    const mode = document.querySelector(`input[name="mode"]:checked`).value;
    const principalInput = parseFloat(document.getElementById("principal").value);
    const ratePercent = parseFloat(document.getElementById("rate").value);
    const time = parseFloat(document.getElementById("time").value);

    if (isNaN(principalInput) || isNaN(ratePercent) || isNaN(time)) {
        document.getElementById("result").innerText =
            "Por favor, preencha todos os campos corretamente.";
        return;
    }

    const rate = ratePercent / 100;
    const base = 1 + rate;

    let output = "";

    if (mode === "normal") {
        const amount = principalInput * Math.pow(base, time);

        output = `
        Fórmula:<br>
        M = C × (1 + i)^n<br><br>

        Substituindo:<br>
        M = ${principalInput} × (${base.toFixed(4)})^${time}<br><br>

        Resultado:<br>
        M = ${amount.toFixed(2)}
        `;
    } else if (mode === "reverse") {
        const required = principalInput / Math.pow(base, time);

        output = `
        Fórmula Inversa:<br>
        C = M / (1 + i)^n<br><br>

        Substituindo:<br>
        C = ${principalInput} / (${base.toFixed(4)})^${time}<br><br>

        Investimento Necessário:<br>
        C = ${required.toFixed(2)}
        `;
    } else if (mode === "simple") {
        const simpleAmount = principalInput * (1 + rate * time);

        output = `
        Fórmula:<br>
        M = C x (1 + (i x n)<br><br>

        Substituindo:<br>
        M = ${principalInput} x (1 + (${ratePercent}% x ${time}))<br><br>

        Investimento Inicial:<br>
        C = ${simpleAmount.toFixed(2)}
        `;
    } else if (mode === "simple-reverse") {
        const requiredSimple = principalInput / (1 + rate * time);

        output = `
        Fórmula Inversa:<br>
        C = M / (1 + (i x n)<br><br>

        Substituindo:<br>
        C = ${principalInput} / (1 + (${ratePercent}% x ${time}))<br><br>

        Investimento Necessário:<br>
        C = ${requiredSimple.toFixed(2)}
        `;
    } else {
        output = "Modo desconhecido.";
    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
